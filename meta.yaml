{% set name = "metaamrplus" %}
{% set version = "1.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/migshaw03/MetaAMRplus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 47c54705eca30762bf2db36f118da96a9e06630c4507dab7d9f6b4b8c98e47e4

build:
  number: 0
  noarch: generic
  script: |
    set -euo pipefail

    mkdir -p $PREFIX/bin
    mkdir -p $PREFIX/share/metaamrplus
    mkdir -p $PREFIX/share/metaamrplus/db

    # -----------------------------
    # Install executables
    # -----------------------------
    install -m 755 bin/metaamrplus $PREFIX/bin/metaamrplus
    install -m 755 bin/metaamrplus_batch $PREFIX/bin/metaamrplus_batch

    # -----------------------------
    # Install annotation script
    # -----------------------------
    install -m 755 bin/annotate_metaamrplus.py \
      $PREFIX/share/metaamrplus/annotate_metaamrplus.py

    # -----------------------------
    # FIXED: robust DB installation (GitHub tarball safe)
    # -----------------------------
    DB_FOUND=0

    for d in $SRC_DIR/*/db; do
      if [[ -f "$d/MetaAMRplus_v1.0.idmap.tsv" ]]; then

        cp "$d"/MetaAMRplus_DB_v1.0.* \
          $PREFIX/share/metaamrplus/db/

        cp "$d"/MetaAMRplus_v1.0.idmap.tsv \
          $PREFIX/share/metaamrplus/db/

        DB_FOUND=1
        break
      fi
    done

    if [[ "$DB_FOUND" -ne 1 ]]; then
      echo "ERROR: MetaAMRplus DB files not found in source tree"
      exit 1
    fi

requirements:
  run:
    - bash
    - python >=3.8
    - blast
    - prodigal
    - awk
    - coreutils

test:
  commands:
    - metaamrplus --help
    - metaamrplus --version

about:
  home: https://github.com/migshaw03/MetaAMRplus
  license: MIT
  license_file: LICENSE
  summary: "MetaAMRplus: detection of AMR and metal resistance genes with colocalisation analysis"
  description: |
    MetaAMRplus detects antimicrobial resistance (AMR) and metal resistance genes
    and evaluates their genomic colocalisation from bacterial genomes.
