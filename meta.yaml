package:
  name: metaamrplus
  version: 1.4.1

source:
  url: https://github.com/migshaw03/MetaAMRplus/archive/refs/tags/v1.4.1.tar.gz
  sha256: 8d0f9f87eebb803b498e0cf3ffd2c574970bd672e915725951ec74f9c4d542e2

build:
  noarch: generic
  number: 0
  script: |
    set -euo pipefail

    # Inject version into runtime
    export METAAMRPLUS_VERSION="1.4.1"

    echo "==== MetaAMRplus build starting ===="
    echo "SRC_DIR: $SRC_DIR"
    echo "VERSION: $METAAMRPLUS_VERSION"

    mkdir -p "$PREFIX/bin"
    mkdir -p "$PREFIX/share/metaamrplus/db"
    mkdir -p "$PREFIX/share/metaamrplus"

    ########################################
    # Install executables
    ########################################
    install -m 755 "$SRC_DIR/bin/metaamrplus" "$PREFIX/bin/metaamrplus"
    install -m 755 "$SRC_DIR/bin/metaamrplus_batch" "$PREFIX/bin/metaamrplus_batch"

    if [[ -f "$SRC_DIR/bin/metaamrplus-download-db" ]]; then
      install -m 755 "$SRC_DIR/bin/metaamrplus-download-db" "$PREFIX/bin/metaamrplus-download-db"
    fi

    ########################################
    # Install annotation script
    ########################################
    install -m 755 "$SRC_DIR/bin/annotate_metaamrplus.py" \
      "$PREFIX/share/metaamrplus/annotate_metaamrplus.py"

    ########################################
    # Database handling
    ########################################
    DB_DIR="$SRC_DIR/db"
    echo "Using DB_DIR: $DB_DIR"

    if [[ ! -d "$DB_DIR" ]]; then
      echo "ERROR: DB directory not found"
      exit 1
    fi

    echo "Copying BLAST DB files..."
    cp "$DB_DIR"/MetaAMRplus_DB_v1.0.* "$PREFIX/share/metaamrplus/db/" || true

    ########################################
    # Optional file (safe)
    ########################################
    if [[ -f "$DB_DIR/MetaAMRplus_v1.0.idmap.tsv" ]]; then
      cp "$DB_DIR/MetaAMRplus_v1.0.idmap.tsv" "$PREFIX/share/metaamrplus/db/"
      echo "idmap.tsv copied"
    else
      echo "WARNING: idmap.tsv not found (skipping safely)"
    fi

    ########################################
    # Ensure executables are runnable
    ########################################
    chmod +x "$PREFIX/bin/metaamrplus"
    chmod +x "$PREFIX/bin/metaamrplus_batch"

    echo "==== Build completed successfully ===="

requirements:
  build:
    - bash
    - coreutils

  run:
    - python >=3.8
    - bash
    - coreutils
    - awk
    - blast
    - prodigal

test:
  commands:
    - metaamrplus --help
    - metaamrplus --version

about:
  home: https://github.com/migshaw03/MetaAMRplus
  license: MIT
  summary: "MetaAMRplus: AMR + metal resistance + colocalisation analysis"
