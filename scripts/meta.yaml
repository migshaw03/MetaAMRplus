{% set name = "metaamrplus" %}
{% set version = "1.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/misheckshawa/MetaAMRplus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: REPLACE_WITH_CORRECT_SHA256

build:
  number: 0
  noarch: generic

  script: |
    set -e

    # -----------------------------
    # Create directories
    # -----------------------------
    mkdir -p $PREFIX/bin
    mkdir -p $PREFIX/share/{{ name }}/db
    mkdir -p $PREFIX/share/{{ name }}/scripts

    # -----------------------------
    # Install main executables
    # -----------------------------
    install -m 755 bin/metaamrplus $PREFIX/bin/metaamrplus
    install -m 755 bin/metaamrplus_batch $PREFIX/bin/metaamrplus_batch

    # -----------------------------
    # Install annotation script
    # -----------------------------
    install -m 755 scripts/annotate_metaamrplus.py \
      $PREFIX/share/{{ name }}/scripts/annotate_metaamrplus.py

    # -----------------------------
    # CRITICAL FIX: Install FULL database
    # -----------------------------
    # This is the key fix for your NA problem
    cp -r db/* $PREFIX/share/{{ name }}/db/

requirements:
  host:
    - python >=3.8

  run:
    - bash
    - python >=3.8
    - prodigal
    - blast
    - awk
    - coreutils

test:
  commands:
    - metaamrplus --version
    - metaamrplus --help

about:
  home: https://github.com/misheckshawa/MetaAMRplus
  license: MIT
  license_file: LICENSE
  summary: "MetaAMRplus: AMR + metal resistance detection with colocalisation"
  description: |
    MetaAMRplus integrates ORF prediction, BLAST-based homology search,
    curated annotation, and distance-based AMR–metal colocalisation analysis
    for bacterial genome and plasmid analysis.

  doc_url: https://github.com/misheckshawa/MetaAMRplus
  dev_url: https://github.com/misheckshawa/MetaAMRplus

extra:
  identifiers:
    - biotools:metaamrplus
  keywords:
    - antimicrobial resistance
    - metal resistance
    - plasmids
    - colocalisation
    - bacterial genomics
